version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm install
        - npx prisma generate
    build:
      commands:
        - env | grep -e DATABASE_URL -e NEXT_PUBLIC_ -e NEXTAUTH_ -e CLOUDINARY_ -e STRIPE_ -e ADMIN_ >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
